<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Atención - Enfermería</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
    <style>
        .form-card {
            max-width: 500px;
        }
        .form-card textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s ease;
            background-color: #f8fafc;
            color: #1e293b;
            resize: vertical;
            min-height: 80px;
        }
        .form-card textarea:focus {
            outline: none;
            border-color: #1a4d8c;
            box-shadow: 0 0 0 3px rgba(26, 77, 140, 0.15);
            background-color: #ffffff;
        }
        .form-card .row {
            display: flex;
            gap: 12px;
        }
        .form-card .row > div {
            flex: 1;
        }
        .success-message {
            display: none;
            background: #d1fae5;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 16px;
            text-align: center;
            font-weight: 500;
        }
        .success-message.show {
            display: block;
        }
        .paciente-info {
            background: #f1f5f9;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            border-left: 4px solid #1a4d8c;
        }
        .paciente-info strong {
            color: #1a4d8c;
        }
    </style>
</head>
<body>
    <div class="card form-card">
        <div style="text-align: center;">
            <span style="font-size: 36px;">🩺</span>
            <h2 style="color: #1a4d8c; font-size: 24px; font-weight: 700;">Registro de Atención</h2>
            <p class="text-muted text-small">Área de Enfermería</p>
        </div>
        
        <!-- Información del paciente -->
        <div class="paciente-info" id="pacienteInfo">
            <strong>👤 Paciente:</strong> <span id="pacienteNombre">Cargando...</span><br>
            <strong>📋 RUT:</strong> <span id="pacienteRut">Cargando...</span>
        </div>
        
        <form id="atencionForm">
            <label for="fechaAtencion">📅 Fecha de atención</label>
            <input type="date" id="fechaAtencion" required>
            
            <label for="horaAtencion">🕐 Hora de atención</label>
            <input type="time" id="horaAtencion" required>
            
            <label for="enfermero">👨‍⚕️ Enfermero/a que atiende</label>
            <input type="text" id="enfermero" placeholder="Nombre del enfermero/a" required>
            
            <label for="descripcion">📝 Descripción de la atención</label>
            <textarea id="descripcion" placeholder="Describa el motivo de la atención, síntomas, tratamiento, etc." required></textarea>
            
            <label for="tipoAtencion">🏷️ Tipo de atención</label>
            <select id="tipoAtencion" required>
                <option value="">Seleccione un tipo...</option>
                <option value="Consulta general">Consulta general</option>
                <option value="Urgencia">Urgencia</option>
                <option value="Control">Control</option>
                <option value="Vacunación">Vacunación</option>
                <option value="Examen">Examen</option>
                <option value="Procedimiento">Procedimiento</option>
                <option value="Post-operatorio">Post-operatorio</option>
                <option value="Terapia">Terapia</option>
                <option value="Otra">Otra</option>
            </select>
            
            <button type="submit" class="btn btn-success btn-block" style="margin-top: 20px;">💾 Guardar atención</button>
            <button type="button" class="btn btn-secondary btn-block" style="margin-top: 10px;" onclick="window.location.href='index.html'">⬅ Volver al inicio</button>
        </form>
        
        <div class="success-message" id="successMessage">
            ✅ Atención registrada exitosamente
        </div>
    </div>

    <script>
        // =============================================
        // OBTENER DATOS DEL PACIENTE (desde URL)
        // =============================================
        function getParametro(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const rutPaciente = getParametro('rut');
        const nombrePaciente = getParametro('nombre') || 'Paciente';

        if (rutPaciente) {
            document.getElementById('pacienteNombre').textContent = nombrePaciente;
            document.getElementById('pacienteRut').textContent = rutPaciente;
        } else {
            // Si no viene RUT, permitir seleccionar manualmente
            document.getElementById('pacienteInfo').innerHTML = `
                <strong>⚠️</strong> No se especificó paciente. 
                <br>Ingrese el RUT manualmente en el campo de abajo.
                <br><br>
                <label for="rutManual" style="margin-top: 0;">RUT del paciente:</label>
                <input type="text" id="rutManual" placeholder="Ej: 12345678-9" style="width:100%; padding:8px; border:1px solid #cbd5e1; border-radius:8px;">
            `;
        }

        // =============================================
        // GUARDAR ATENCIÓN
        // =============================================
        document.getElementById('atencionForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Obtener RUT (desde URL o manual)
            let rut = rutPaciente;
            if (!rut) {
                rut = document.getElementById('rutManual').value.trim();
                if (!rut) {
                    alert("❌ Por favor, ingrese el RUT del paciente.");
                    return;
                }
            }
            
            const fecha = document.getElementById('fechaAtencion').value;
            const hora = document.getElementById('horaAtencion').value;
            const enfermero = document.getElementById('enfermero').value.trim();
            const descripcion = document.getElementById('descripcion').value.trim();
            const tipoAtencion = document.getElementById('tipoAtencion').value;
            
            if (!fecha || !hora || !enfermero || !descripcion || !tipoAtencion) {
                alert("❌ Complete todos los campos");
                return;
            }
            
            // Obtener nombre del paciente
            let nombre = nombrePaciente;
            if (!nombre || nombre === 'Paciente') {
                // Buscar en registros existentes
                const registros = JSON.parse(localStorage.getItem('registros_enfermeria')) || [];
                const paciente = registros.find(r => r.rut === rut);
                nombre = paciente ? paciente.nombre + ' ' + paciente.apellido : 'Paciente';
            }
            
            // Crear registro de atención
            const atencion = {
                id: Date.now(),
                rutPaciente: rut,
                nombrePaciente: nombre,
                fecha: fecha,
                hora: hora,
                fechaCompleta: fecha + ' ' + hora,
                enfermero: enfermero,
                tipo: tipoAtencion,
                descripcion: descripcion,
                fechaRegistro: new Date().toLocaleString(),
                estado: 'Completada'
            };
            
            // Guardar en localStorage
            let atenciones = JSON.parse(localStorage.getItem('atenciones_enfermeria')) || [];
            atenciones.push(atencion);
            localStorage.setItem('atenciones_enfermeria', JSON.stringify(atenciones));
            
            // Mostrar mensaje de éxito
            const successMsg = document.getElementById('successMessage');
            successMsg.classList.add('show');
            
            // Limpiar formulario (excepto paciente)
            document.getElementById('descripcion').value = '';
            document.getElementById('enfermero').value = '';
            document.getElementById('tipoAtencion').value = '';
            
            // Ocultar mensaje después de 3 segundos
            setTimeout(() => {
                successMsg.classList.remove('show');
            }, 3000);
        });
    </script>
</body>
</html>
