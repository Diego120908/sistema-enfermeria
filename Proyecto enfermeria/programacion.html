<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Programación - Enfermería</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <div class="card" style="max-width: 400px;">
        <div class="text-center">
            <span style="font-size: 40px;">💻</span>
            <h2 style="color: #2c3e7a; font-size: 24px; font-weight: 700;">Acceso restringido</h2>
            <p class="text-muted text-small">Equipo de programación · Área de desarrollo</p>
        </div>
        
        <form id="programacionForm">
            <label for="nombreProg">Nombre autorizado</label>
            <input type="text" id="nombreProg" placeholder="Ingrese su nombre de usuario" required>
            
            <label for="rutProg">RUT</label>
            <input type="text" id="rutProg" placeholder="Ingrese su RUT" required>
            
            <label for="passwordProg">Contraseña de acceso</label>
            <input type="password" id="passwordProg" placeholder="Ingrese su contraseña" required>
            
            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 20px;">🔓 Acceder al sistema</button>
            <button type="button" class="btn btn-secondary btn-block" style="margin-top: 10px;" onclick="window.location.href='index.html'">⬅ Volver al menú principal</button>
        </form>
        
        <div style="text-align: center; margin-top: 18px; padding-top: 14px; border-top: 1px solid #d4dcec;">
            <span style="background: #e8edf6; padding: 4px 16px; border-radius: 30px; font-size: 11px; color: #64748b;">
                🔒 Acceso autorizado exclusivo
            </span>
        </div>
    </div>

    <script>
        const usuariosAutorizados = [
            { nombre: "mayckool", rut: "22793944-3" },
            { nombre: "diego", rut: "22824389-2" },
            { nombre: "luciano", rut: "22100293-8" },
            { nombre: "joaquin", rut: "22894216-2" }
        ];
        
        const CONTRASENA_CORRECTA = "2448programacion";
        
        document.getElementById('programacionForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const nombreIngresado = document.getElementById('nombreProg').value.trim().toLowerCase();
            const rutIngresado = document.getElementById('rutProg').value.trim();
            const contrasena = document.getElementById('passwordProg').value;
            
            if (!nombreIngresado || !rutIngresado || !contrasena) {
                alert("❌ Acceso denegado.");
                return;
            }
            
            const usuarioValido = usuariosAutorizados.find(
                u => u.nombre === nombreIngresado && u.rut === rutIngresado
            );
            
            if (!usuarioValido) {
                alert("❌ Acceso denegado. El nombre y RUT no coinciden.");
                return;
            }
            
            if (contrasena !== CONTRASENA_CORRECTA) {
                alert("❌ Acceso denegado. Contraseña incorrecta.");
                return;
            }
            
            let accesosProg = JSON.parse(localStorage.getItem('accesos_programacion')) || [];
            accesosProg.push({
                id: Date.now(),
                nombre: usuarioValido.nombre,
                rut: usuarioValido.rut,
                fecha: new Date().toLocaleString(),
                accion: "Ingreso al sistema de programación"
            });
            localStorage.setItem('accesos_programacion', JSON.stringify(accesosProg));
            
            localStorage.setItem('programador_actual', JSON.stringify({
                nombre: usuarioValido.nombre,
                rut: usuarioValido.rut,
                hora: new Date().toLocaleString()
            }));
            
            alert("✅ Acceso concedido. Bienvenido " + usuarioValido.nombre);
            window.location.href = "panel_programacion.html";
        });
        
        window.verUsuarios = function() {
            console.log("👥 Usuarios autorizados:");
            usuariosAutorizados.forEach(u => {
                console.log(`  - ${u.nombre}: ${u.rut}`);
            });
            return usuariosAutorizados;
        };
        
        window.agregarUsuario = function(nombre, rut) {
            const nombreLower = nombre.toLowerCase();
            const existe = usuariosAutorizados.some(u => u.nombre === nombreLower || u.rut === rut);
            if (existe) {
                alert("⚠️ Ese nombre o RUT ya está registrado.");
                return false;
            }
            usuariosAutorizados.push({ nombre: nombreLower, rut: rut });
            alert(`✅ Usuario ${nombre} agregado correctamente.`);
            return true;
        };
        
        window.eliminarUsuario = function(nombre) {
            const nombreLower = nombre.toLowerCase();
            const index = usuariosAutorizados.findIndex(u => u.nombre === nombreLower);
            if (index !== -1) {
                usuariosAutorizados.splice(index, 1);
                alert(`❌ Usuario ${nombre} eliminado correctamente.`);
                return true;
            } else {
                alert(`⚠️ No se encontró el usuario: ${nombre}`);
                return false;
            }
        };
    </script>
</body>
</html>
