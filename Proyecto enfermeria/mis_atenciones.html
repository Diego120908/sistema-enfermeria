<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solicitudes - Enfermería</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <div class="card card-wide" style="max-width: 1000px;">
        <div class="paciente-header" style="background: linear-gradient(135deg, #2c3e7a 0%, #4a6fa5 100%); color: white; padding: 20px 24px; border-radius: 16px 16px 0 0; margin: -30px -35px 20px -35px;">
            <h2>📋 Mis Solicitudes</h2>
            <p>Estado de tus solicitudes de atención médica</p>
        </div>
        
        <div id="pacienteInfo" style="margin-bottom: 16px;">
            <strong>👤 Paciente:</strong> <span id="nombrePaciente">Cargando...</span><br>
            <strong>📋 RUT:</strong> <span id="rutPaciente">Cargando...</span>
        </div>
        
        <div class="filtros-mis">
            <select id="filtroEstado" onchange="cargarSolicitudes()">
                <option value="todos">📋 Todos los estados</option>
                <option value="Pendiente">⏳ Pendientes</option>
                <option value="Aceptada">✅ Aceptadas</option>
                <option value="Atendida">🩺 Atendidas</option>
                <option value="Rechazada">❌ Rechazadas</option>
            </select>
            <span style="font-size:12px; color:#64748b; align-self:center;">Última actualización: <span id="ultimaActualizacion">--</span></span>
        </div>
        
        <div id="contenedorSolicitudes"></div>
        
        <div style="margin-top: 20px; text-align: center;">
            <button class="btn btn-primary" onclick="window.location.href='registro_paciente.html'">📝 Nueva solicitud</button>
            <button class="btn btn-secondary" onclick="window.location.href='index.html'" style="margin-left: 10px;">⬅ Volver al inicio</button>
        </div>
    </div>

    <script>
        function getParametro(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        let rutPaciente = getParametro('rut');
        let nombrePaciente = getParametro('nombre') || 'Paciente';

        function cargarInfoPaciente() {
            if (rutPaciente) {
                document.getElementById('nombrePaciente').textContent = nombrePaciente;
                document.getElementById('rutPaciente').textContent = rutPaciente;
                cargarSolicitudes();
            } else {
                document.getElementById('pacienteInfo').innerHTML = `
                    <strong>⚠️</strong> Ingrese su RUT para ver sus solicitudes:
                    <br><br>
                    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
                        <input type="text" id="rutInput" placeholder="Ej: 12345678-9" style="padding:10px 14px; border:1px solid #c4cfe0; border-radius:8px; flex:1; min-width:200px;">
                        <button class="btn btn-primary" onclick="buscarPorRUT()">🔍 Buscar</button>
                    </div>
                    <br>
                    <div id="mensajeError" style="color:#b05a6e; display:none;">❌ No se encontraron solicitudes para este RUT</div>
                `;
                
                document.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && document.getElementById('rutInput')) {
                        buscarPorRUT();
                    }
                });
            }
        }

        function buscarPorRUT() {
            const rut = document.getElementById('rutInput').value.trim();
            if (!rut) {
                alert("❌ Ingrese un RUT");
                return;
            }
            
            const solicitudes = JSON.parse(localStorage.getItem('solicitudes_pacientes')) || [];
            const paciente = solicitudes.find(s => s.rut === rut);
            
            if (paciente) {
                window.location.href = 'mis_atenciones.html?rut=' + rut + '&nombre=' + encodeURIComponent(paciente.nombre);
            } else {
                document.getElementById('mensajeError').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('mensajeError').style.display = 'none';
                }, 3000);
            }
        }

        function cargarSolicitudes() {
            const rut = document.getElementById('rutPaciente').textContent;
            if (!rut || rut === 'Cargando...' || rut === 'No especificado') {
                document.getElementById('contenedorSolicitudes').innerHTML = `
                    <div class="empty-message">
                        🔍 Ingrese su RUT para ver sus solicitudes
                    </div>
                `;
                return;
            }
            
            const todasSolicitudes = JSON.parse(localStorage.getItem('solicitudes_pacientes')) || [];
            let solicitudes = todasSolicitudes.filter(s => s.rut === rut);
            
            const estadoFiltro = document.getElementById('filtroEstado').value;
            if (estadoFiltro !== 'todos') {
                solicitudes = solicitudes.filter(s => s.estado === estadoFiltro);
            }
            
            solicitudes.sort((a, b) => new Date(b.fecha_solicitud) - new Date(a.fecha_solicitud));
            
            document.getElementById('ultimaActualizacion').textContent = new Date().toLocaleString();
            
            const container = document.getElementById('contenedorSolicitudes');
            
            if (solicitudes.length === 0) {
                container.innerHTML = `
                    <div class="empty-message">
                        📭 No tienes solicitudes registradas.
                        <br><br>
                        <button class="btn btn-primary" onclick="window.location.href='registro_paciente.html'">
                            📝 Solicitar atención médica
                        </button>
                    </div>
                `;
                return;
            }
            
            let html = `<p style="color:#64748b; margin-bottom:12px;">📌 Total de solicitudes: ${solicitudes.length}</p>`;
            
            for (const s of solicitudes) {
                const estadoClass = s.estado === 'Pendiente' ? 'estado-pendiente' :
                                   s.estado === 'Aceptada' ? 'estado-aceptada' :
                                   s.estado === 'Rechazada' ? 'estado-rechazada' : 'estado-atendida';
                
                const cardClass = s.estado === 'Aceptada' ? 'solicitud-card aceptada' :
                                  s.estado === 'Rechazada' ? 'solicitud-card rechazada' :
                                  s.estado === 'Atendida' ? 'solicitud-card atendida' : 'solicitud-card';
                
                const fechaSolicitud = new Date(s.fecha_solicitud).toLocaleString('es-CL', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                let estadoTexto = s.estado;
                if (s.estado === 'Pendiente') estadoTexto = '⏳ Pendiente - Esperando enfermero';
                else if (s.estado === 'Aceptada') estadoTexto = '✅ Aceptada - Hora asignada';
                else if (s.estado === 'Rechazada') estadoTexto = '❌ Rechazada';
                else if (s.estado === 'Atendida') estadoTexto = '🩺 Atendida';
                
                html += `
                    <div class="${cardClass}">
                        <div class="header-row">
                            <div>
                                <span class="fecha">📅 ${fechaSolicitud}</span>
                            </div>
                            <div>
                                <span class="estado ${estadoClass}">${estadoTexto}</span>
                            </div>
                        </div>
                        <div class="detalle">
                            <strong>🤧 Alergias:</strong> ${escapeHtml(s.alergias || 'Ninguna')}<br>
                            <strong>📝 Motivo:</strong> ${escapeHtml(s.motivo)}<br>
                            ${s.enfermero_asignado ? `<strong>👨‍⚕️ Enfermero:</strong> ${escapeHtml(s.enfermero_asignado)}<br>` : ''}
                            ${s.hora_asignada ? `<strong>🕐 Hora asignada:</strong> ${s.hora_asignada}<br>` : ''}
                            ${s.fecha_atencion ? `<strong>📅 Fecha atención:</strong> ${s.fecha_atencion}` : ''}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        cargarInfoPaciente();
    </script>
</body>
</html>
