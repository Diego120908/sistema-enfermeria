    function getContrasenaPorCurso(curso) {
        const defaultPass = { "3° A": "EFI3A", "3° B": "EFI3B", "4° A": "EFI4A", "4° B": "EFI4B" };
        const stored = localStorage.getItem('contrasenas_enfermeros');
        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (parsed[curso]) return parsed[curso];
            } catch (e) {}
        }
        return defaultPass[curso] || null;
    }

    document.getElementById('totalEnfermeros').textContent = enfermerosAutorizados.length;

    document.getElementById('enfermeroRut').addEventListener('input', function() {
        const rut = this.value.trim();
        const infoDiv = document.getElementById('infoNombre');
        const passDiv = document.getElementById('infoContrasena');
        if (rut.length >= 6) {
            const enfermero = enfermerosAutorizados.find(e => e.rut === rut);
            if (enfermero) {
                document.getElementById('nombreCompleto').textContent = enfermero.nombre;
                document.getElementById('cursoCompleto').textContent = enfermero.curso;
                document.getElementById('cursoBadge').textContent = enfermero.curso;
                infoDiv.classList.add('visible');
                const contrasena = getContrasenaPorCurso(enfermero.curso);
                document.getElementById('contrasenaSugerida').textContent = contrasena;
                document.getElementById('enfermeroPass').value = contrasena;
                passDiv.classList.add('visible');
            } else {
                document.getElementById('nombreCompleto').textContent = 'No encontrado';
                document.getElementById('cursoCompleto').textContent = '---';
                document.getElementById('cursoBadge').textContent = '---';
                infoDiv.classList.remove('visible');
                passDiv.classList.remove('visible');
            }
        } else {
            infoDiv.classList.remove('visible');
            passDiv.classList.remove('visible');
        }
    });

    // 🔥 FORMULARIO DE LOGIN CORREGIDO
    document.getElementById('enfermeroLoginForm').addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const rut = document.getElementById('enfermeroRut').value.trim();
        const pass = document.getElementById('enfermeroPass').value.trim();
        
        if (!rut || !pass) {
            alert("❌ Complete todos los campos");
            return;
        }
        
        // Buscar enfermero por RUT (local)
        const enfermero = enfermerosAutorizados.find(e => e.rut === rut);
        
        if (!enfermero) {
            alert("❌ Acceso denegado. RUT no autorizado.");
            return;
        }
        
        // Validar contraseña según el curso
        const contrasenaCorrecta = getContrasenaPorCurso(enfermero.curso);
        
        if (pass !== contrasenaCorrecta) {
            alert(`❌ Contraseña incorrecta. La contraseña para ${enfermero.curso} es "${contrasenaCorrecta}"`);
            return;
        }
        
        // ✅ Guardar en localStorage
        localStorage.setItem('enfermero_actual', JSON.stringify({
            nombre: enfermero.nombre,
            rut: enfermero.rut,
            curso: enfermero.curso,
            hora: new Date().toLocaleString()
        }));
        
        // ✅ Guardar acceso en localStorage
        let accesos = JSON.parse(localStorage.getItem('accesos_enfermeros')) || [];
        accesos.push({
            id: Date.now(),
            nombre: enfermero.nombre,
            rut: enfermero.rut,
            curso: enfermero.curso,
            fecha: new Date().toLocaleString(),
            accion: "Ingreso al panel de enfermero"
        });
        localStorage.setItem('accesos_enfermeros', JSON.stringify(accesos));
        
        // ✅ Guardar acceso en la nube (Google Sheets)
        try {
            await guardarAccesoCloud({
                tipo: 'Enfermero',
                nombre: enfermero.nombre,
                rut: enfermero.rut,
                accion: 'Ingreso al panel de enfermero'
            });
        } catch (error) {
            console.error('Error guardando acceso en la nube:', error);
            // El acceso continúa aunque falle la nube
        }
        
        alert("✅ Acceso concedido. Bienvenido/a " + enfermero.nombre);
        window.location.href = "enfermero_panel.html";
    });
