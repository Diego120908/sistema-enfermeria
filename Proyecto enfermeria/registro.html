<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de paciente - Enfermería</title>
    <link rel="stylesheet" href="styles.css">
    <script src="config.js"></script>
</head>
<body>
    <div class="card">
        <div class="text-center">
            <span style="font-size: 36px;">📝</span>
            <h2 style="color: #2c3e7a; font-size: 24px; font-weight: 700;">Registro de paciente</h2>
            <p class="text-muted text-small">Sistema de Enfermería</p>
        </div>
        
        <form id="registroForm">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" placeholder="Ingrese su nombre" required>
            
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" placeholder="Ingrese su apellido" required>
            
            <label for="rut">RUT</label>
            <input type="text" id="rut" placeholder="Ej: 12345678-9" required>
            
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="Mínimo 6 caracteres" required>
            
            <button type="submit" class="btn btn-success btn-block" style="margin-top: 20px;">✅ Registrarse</button>
            <button type="button" class="btn btn-secondary btn-block" style="margin-top: 10px;" onclick="window.location.href='index.html'">⬅ Volver al inicio</button>
        </form>
    </div>

    <script>
        document.getElementById('registroForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const nombre = document.getElementById('nombre').value.trim();
            const apellido = document.getElementById('apellido').value.trim();
            const rut = document.getElementById('rut').value.trim();
            const password = document.getElementById('password').value;
            
            if (!nombre || !apellido || !rut || !password) {
                alert("❌ Complete todos los campos");
                return;
            }
            
            if (password.length < 6) {
                alert("❌ La contraseña debe tener al menos 6 caracteres");
                return;
            }
            
            const registro = {
                id: Date.now(),
                nombre: nombre,
                apellido: apellido,
                rut: rut,
                password: password,
                fecha: new Date().toLocaleString(),
                accion: "Registro de usuario"
            };
            
            let registros = JSON.parse(localStorage.getItem('registros_enfermeria')) || [];
            registros.push(registro);
            localStorage.setItem('registros_enfermeria', JSON.stringify(registros));
            
            alert("✅ Registro exitoso. Bienvenido/a " + nombre + " " + apellido);
            document.getElementById('registroForm').reset();
        });
    </script>
</body>
</html>
